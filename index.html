<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Trade - La plateforme de trading Roblox</title>
    <link rel="icon" type="image/png" href="aura_trade_logo.png">
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="Aura Trade — La plateforme de trading nouvelle génération pour l'écosystème Roblox. Échangez vos items School Fr RP, Adopt Me, MM2 et plus encore.">
    <meta name="keywords" content="Roblox, Trading, Items, Aura Trade, School Fr RP, Adopt Me, MM2">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="style.css?v=mobile2">

    <!-- Auth & Database -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="auth.js?v=oauth3"></script>
</head>
<body>
    <!-- HEADER -->

    <header class="header">
        <div class="container header-inner">
            <a class="logo" onclick="navigate('home')" id="nav-logo">
                <img src="aura_trade_logo.png" alt="Aura Trade Logo" style="height: 38px; border-radius: 8px;">
                <span class="logo-text">Aura Trade</span>
            </a>

            <div class="header-search">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" placeholder="Rechercher un item, un jeu..." id="headerSearchInput">
            </div>
            <div class="header-actions" id="headerActions">
                <button class="btn btn-ghost premium-header-btn" onclick="navigate('premium')" style="display: flex; align-items: center; gap: 6px; font-weight: 700;">
                    <span class="btn-icon">🛒</span> <span class="btn-text">Boutique</span>
                </button>
                <button class="btn btn-primary" onclick="navigate('create')" id="btn-publish">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    <span class="btn-text">Publier</span>
                </button>

                <div id="userActions" style="display: flex; align-items: center; gap: 8px;">
                    <button class="icon-btn" onclick="navigate('admin')" title="Panel Admin" id="btn-admin-header" style="display:none; font-size: 1.1rem;">
                        👑
                    </button>
                    <button class="icon-btn" onclick="navigate('favorites')" title="Favoris" id="btn-favorites">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
                    </button>
                    <button class="icon-btn" onclick="navigate('messages')" title="Messages" id="btn-messages">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
                        <span class="badge-dot" id="msgBadge" style="display:none;"></span>
                    </button>
                    <button class="icon-btn settings-btn" onclick="navigate('settings')" title="Paramètres">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
                    </button>
                    <div class="avatar-sm" onclick="navigate('profile')" id="headerAvatar">?</div>

                </div>

                <button id="loginBtn" class="btn btn-secondary" onclick="window.location.href='login.html'" style="display: none;">Connexion</button>
            </div>

        </div>
    </header>

    <!-- MAIN -->
    <main class="main" id="appContent"></main>

    <!-- TOAST -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- BOTTOM NAV (MOBILE) -->
    <nav class="bottom-nav" id="bottomNav">
        <a class="nav-item active" onclick="navigate('home')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
            <span>Accueil</span>
        </a>
        <a class="nav-item" onclick="navigate('favorites')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
            <span>Favoris</span>
        </a>
        <a class="nav-item create-btn" onclick="navigate('create')">
            <div class="create-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </div>
            <span>Publier</span>
        </a>
        <a class="nav-item" onclick="navigate('messages')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
            <span>Messages</span>
        </a>
        <a class="nav-item" onclick="navigate('profile')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            <span>Profil</span>
        </a>
        <a class="nav-item" onclick="navigate('admin')" id="bottomNavAdmin" style="display:none;">
            <span style="font-size: 1.2rem; margin-bottom: 2px;">👑</span>
            <span>Admin</span>
        </a>
    </nav>

    <!-- Scripts -->
    <script src="script.js?v=admin_crown"></script>
</body>
</html>
